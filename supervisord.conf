[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:nginx]
# Swaps '80' for the public port and starts Nginx
command=/bin/sh -c "sed -i 's/listen 80;/listen '${PORT}';/' /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ktor]
# Ktor starts on internal port 9090
command=java --add-opens java.base/jdk.internal.misc=ALL-UNNAMED -jar /app/server.jar
autostart=true
autorestart=true
environment=PORT="9090"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0