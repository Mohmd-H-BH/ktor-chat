events {}
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
     
    upstream backend {
        # This matches the 'environment=PORT="9090"' in supervisord.conf
        server localhost:9090;
    }
    
    server {
        listen 80; # Supervisord will swap this 80 for the real Railway/Render port
        server_name _;
        
        # All traffic (/) now goes to Ktor
        location / {
            proxy_pass http://backend; 
            proxy_http_version 1.1;
            
            # WebSocket Support (Essential for Chat)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Pass real user IP to Ktor logs
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Prevent Chat timeouts (1 day timeout)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}